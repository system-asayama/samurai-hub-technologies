name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USER_PRODUCTION }}
          port: ${{ secrets.SSH_PORT_PRODUCTION }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}
          envs: GITHUB_TOKEN
          script: |
            echo "[DEBUG] target_dir=~/apps/samurai-hub-technologies" && echo "[DEBUG] full_name=system-asayama/samurai-hub-technologies" && echo "[DEBUG] branch=main" && echo "[DEBUG] deploy_mode=docker" && echo "[DEBUG] hostname=$(hostname)" && echo "[DEBUG] whoami=$(whoami)" && echo "[DEBUG] git --version: $(git --version 2>&1)" && echo "[DEBUG] docker --version: $(docker --version 2>&1)" && echo "[DEBUG] docker compose version: $(docker compose version 2>&1)" && echo "[DEBUG] dir exists? $(test -d ~/apps/samurai-hub-technologies && echo YES || echo NO)" && echo "[DEBUG] .git exists? $(test -d ~/apps/samurai-hub-technologies/.git && echo YES || echo NO)" && if [ -d ~/apps/samurai-hub-technologies/.git ]; then echo "[DEBUG] taking git pull path" && cd ~/apps/samurai-hub-technologies && git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/system-asayama/samurai-hub-technologies.git && echo "[DEBUG] git remote URL updated" && git fetch origin main && echo "[DEBUG] git fetch origin main OK" && git checkout -B main origin/main && echo "[DEBUG] checkout & reset to origin/main OK" && echo "[DEBUG] git pull OK"; else echo "[DEBUG] taking git clone path" && mkdir -p "$(dirname ~/apps/samurai-hub-technologies)" && rm -rf ~/apps/samurai-hub-technologies && git clone --branch main https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/system-asayama/samurai-hub-technologies.git ~/apps/samurai-hub-technologies && echo "[DEBUG] git clone OK"; fi && echo "[DEBUG] post-pull, ls ~/apps/samurai-hub-technologies:" && ls -la ~/apps/samurai-hub-technologies | head -20 && cd ~/apps/samurai-hub-technologies && echo "[DEBUG] building samurai_hub_technologies image with --no-cache --pull..." && docker build --pull --no-cache -t samurai_hub_technologies:latest . && (docker stop samurai_hub_technologies 2>/dev/null || true) && (docker rm samurai_hub_technologies 2>/dev/null || true) && docker run -d --name samurai_hub_technologies --restart unless-stopped -p 8084:8084 -v ~/apps/samurai-hub-technologies-data:/data -e "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" -e "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" -e "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" samurai_hub_technologies:latest
